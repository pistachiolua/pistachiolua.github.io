<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pistachio Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #020617;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      text-align: center;
      max-width: 480px;
      width: 100%;
      padding: 20px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 25px;
    }

    .box {
      background: #020617;
      border: 1px solid #111827;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.75rem;
      color: #9ca3af;
      text-align: left;
      word-break: break-all;
      margin-bottom: 15px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #111827;
      background: #020617;
      color: #e5e7eb;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.15s;
    }

    .btn:hover {
      background: #030a1a;
    }

    .status {
      margin-top: 15px;
      font-size: 0.7rem;
      color: #6b7280;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h1>Pistachio Hub</h1>
    <div class="sub">loader</div>

    <div class="box" id="script">
      loadstring(game:HttpGet("https://pistachiolua.xyz/script.lua"))()
    </div>

    <button class="btn" onclick="copyScript()">Copy</button>

    <div class="status">
      <span class="dot"></span> online
    </div>
  </div>

  <script>
    function copyScript() {
      const text = document.getElementById('script').innerText;
      navigator.clipboard.writeText(text);
    }
  </script>

</body>
</html>
