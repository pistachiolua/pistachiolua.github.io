<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pistachio Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #020617;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 500px;
      width: 100%;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      color: #9ca3af;
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
    }

    .btn:hover {
      background: #0f172a;
      border-color: #374151;
    }

    .status {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>Pistachio Hub</h1>
    <p>Clean, fast, and minimal script.</p>

    <button class="btn" onclick="downloadScript()">Download</button>

    <div class="status">
      <span class="dot"></span> Online
    </div>
  </div>

  <script>
    function downloadScript() {
      window.location.href = "https://your-download-link.com";
    }
  </script>

</body>
</html>
