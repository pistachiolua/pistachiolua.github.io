<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pistachio</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'JetBrains Mono', monospace; }

    body {
      background:#020617;
      color:#9ca3af;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      animation:fade 0.8s ease forwards;
    }

    @keyframes fade { to { opacity:1; } }

    .wrap { text-align:left; }

    .line {
      font-size:0.75rem;
      cursor:pointer;
      white-space:nowrap;
    }

    .line:hover { color:#e5e7eb; }

    .top {
      display:flex;
      justify-content:space-between;
      margin-bottom:6px;
      font-size:0.65rem;
      color:#6b7280;
    }

    .copied {
      font-size:0.65rem;
      color:#22c55e;
      opacity:0;
      transition:0.15s;
      margin-top:4px;
    }

    .copied.show { opacity:1; }

  </style>
</head>
<body>

  <div class="wrap">
    <div class="top">
      <span>pistachio</span>
      <span>v1.0.0</span>
    </div>

    <div class="line" onclick="copy()" id="script">
      &gt; loadstring(game:HttpGet("https://pistachiolua.xyz/script.lua"))()
    </div>

    <div class="copied" id="c">copied</div>
  </div>

  <script>
    function copy(){
      const t=document.getElementById('script').innerText.replace('> ','');
      navigator.clipboard.writeText(t);
      const c=document.getElementById('c');
      c.classList.add('show');
      setTimeout(()=>c.classList.remove('show'),800);
    }
  </script>

</body>
</html>
