<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pistachio</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'JetBrains Mono', monospace; }

    body {
      background:#020617;
      color:#9ca3af;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      animation:fade 0.8s ease forwards;
      cursor:pointer;
    }

    @keyframes fade { to { opacity:1; } }

    .wrap { text-align:left; }

    .top {
      display:flex;
      justify-content:space-between;
      margin-bottom:6px;
      font-size:0.65rem;
      color:#6b7280;
    }

    .line {
      font-size:0.75rem;
      white-space:nowrap;
    }

    .cursor {
      display:inline-block;
      width:6px;
      margin-left:2px;
      background:#9ca3af;
      animation:blink 1s infinite;
    }

    @keyframes blink {
      0%,50%,100% { opacity:1; }
      25%,75% { opacity:0; }
    }

    .copied {
      font-size:0.65rem;
      color:#22c55e;
      opacity:0;
      transition:0.15s;
      margin-top:4px;
    }

    .copied.show { opacity:1; }

    .glitch {
      animation:glitch 0.2s;
    }

    @keyframes glitch {
      0% { transform:translate(0); }
      25% { transform:translate(-1px,1px); }
      50% { transform:translate(1px,-1px); }
      75% { transform:translate(-1px,-1px); }
      100% { transform:translate(0); }
    }
  </style>
</head>
<body onclick="copy()">

  <div class="wrap" id="wrap">
    <div class="top">
      <span>pistachio</span>
      <span id="version">v...</span>
    </div>

    <div class="line" id="script"></div>

    <div class="copied" id="c">copied</div>
  </div>

  <script>
    const text = '> loadstring(game:HttpGet("https://pistachiolua.xyz/script.lua"))()';
    let i = 0;
    let clicks = 0;

    // typing
    function type(){
      if(i < text.length){
        document.getElementById('script').innerHTML = text.slice(0,i) + '<span class="cursor"></span>';
        i++;
        const delay = Math.random() * 40 + 10;
        setTimeout(type, delay);
      } else {
        document.getElementById('script').innerHTML = text + '<span class="cursor"></span>';
      }
    }

    type();

    // tiny tick sound
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tick(){
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g);
      g.connect(audioCtx.destination);
      o.frequency.value = 800;
      g.gain.value = 0.01; // VERY quiet
      o.start();
      o.stop(audioCtx.currentTime + 0.02);
    }

    // copy
    function copy(){
      const t = text.replace('> ','');
      navigator.clipboard.writeText(t);

      tick();

      const c=document.getElementById('c');
      c.classList.add('show');
      setTimeout(()=>c.classList.remove('show'),800);

      clicks++;
      if(clicks > 5){
        const wrap = document.getElementById('wrap');
        wrap.classList.add('glitch');
        setTimeout(()=>wrap.classList.remove('glitch'),200);
        clicks = 0;
      }
    }

    // dynamic version fetch
    fetch('https://pistachiolua.xyz/version.txt')
      .then(res => res.text())
      .then(v => {
        document.getElementById('version').innerText = v.trim();
      })
      .catch(() => {
        document.getElementById('version').innerText = 'v1.0.0';
      });
  </script>

</body>
</html>
